name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "custom_components/drone_mobile/manifest.json"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version from manifest
        id: current
        run: |
          version=$(jq -r '.version' custom_components/drone_mobile/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Determine next version
        id: next
        run: |
          current="${{ steps.current.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$current"

          # Look at the commit that triggered this workflow
          msg=$(git log -1 --pretty=format:"%s")
          if echo "$msg" | grep -qiE "^BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$msg" | grep -qiE "^feat"; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          next="${major}.${minor}.${patch}"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Bumping $current -> $next"

      - name: Bump manifest, tag, and release
        if: steps.current.outputs.version != steps.next.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.next.outputs.version }}"
          jq --arg v "$version" '.version = $v' custom_components/drone_mobile/manifest.json > tmp.json
          mv tmp.json custom_components/drone_mobile/manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/drone_mobile/manifest.json
          git commit -m "chore: bump version to ${version}"
          git tag "v${version}"
          git push origin main --tags
          gh release create "v${version}" --title "v${version}" --generate-notes
